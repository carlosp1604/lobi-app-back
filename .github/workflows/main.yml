name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  EMAIL_API_TOKEN: ${{ secrets.EMAIL_API_TOKEN }}

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Run ESLint
        run: yarn lint

  unit-and-integration-tests:
    name: Unit & Integration tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load .env.ci to System Env
        run: |
            cat .env.ci >> $GITHUB_ENV
          shell: bash

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Run unit and integration tests
        run: yarn test-unit && yarn test-integration

  integration-db-and-e2e-tests:
    name: Integration DB & E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-and-integration-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ env.DATABASE_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load .env.ci to System Env
        run: |
          cat .env.ci >> $GITHUB_ENV
          shell: bash

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Build Project
        run: yarn build

      - name: Run integration-db tests
        run: yarn test-integration-db

      - name: Run E2E tests
        run: yarn test-e2e
