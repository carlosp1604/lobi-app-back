services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runner
    container_name: ${CONTAINER_NAME}
    restart: always
    environment:
      - PORT=${PORT}
    env_file:
      - ../.env
    networks:
      - caddy_gateway
    labels:
      caddy: ${API_DOMAIN}/
      caddy.reverse_proxy: "{{upstreams (env \"PORT\")}}"

networks:
  caddy_gateway:
    external: true
